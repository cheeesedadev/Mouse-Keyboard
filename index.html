<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Keyboard App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #1e1e1e;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 450px;
        }
        h1 { color: #007acc; margin-bottom: 20px; }
        .info-box {
            text-align: left;
            background: #252526;
            padding: 15px;
            border-left: 4px solid #007acc;
            margin-bottom: 15px;
        }
        h2 { font-size: 1rem; margin: 0 0 5px 0; color: #007acc; text-transform: uppercase; }
        p { margin: 0; color: #ddd; font-size: 0.95rem; }
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background-color: #007acc;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .download-btn:hover { background-color: #005f99; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mouse Keyboard</h1>
        
        <div class="info-box">
            <h2>Description:</h2>
            <p>This app lets you control your mouse on a keyboard</p>
        </div>

        <div class="info-box">
            <h2>Location:</h2>
            <p>C:\Users\user\Downloads</p>
        </div>

        <a href="https://drive.google.com/file/d/1wGdAiuO85bIgp0fowmVSIHtRajCYv-Ht/view?usp=sharing" class="download-btn">Download App</a>
    </div>

</body>
</html>
